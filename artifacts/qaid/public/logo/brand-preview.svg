<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Tajawal:wght@400;700&amp;display=swap');
    </style>

    <!-- Teal-to-blue gradient for icons -->
    <linearGradient id="grd" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- App icon background gradient -->
    <linearGradient id="bgrd" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#134E9F"/>
    </linearGradient>

    <!-- Reusable icon clip/scale macros via <symbol> -->
    <symbol id="q-icon-gradient" viewBox="0 0 48 48">
      <path d="M 27 35.1 A 11.5 11.5 0 1 0 32.1 32.1"
            stroke="url(#grd)" stroke-width="3.6" stroke-linecap="round"/>
      <line x1="32.1" y1="32.1" x2="39.7" y2="39.7"
            stroke="url(#grd)" stroke-width="3.6" stroke-linecap="round"/>
    </symbol>

    <symbol id="q-icon-white" viewBox="0 0 48 48">
      <path d="M 27 35.1 A 11.5 11.5 0 1 0 32.1 32.1"
            stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round"/>
      <line x1="32.1" y1="32.1" x2="39.7" y2="39.7"
            stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round"/>
    </symbol>

    <symbol id="q-icon-dark" viewBox="0 0 48 48">
      <path d="M 27 35.1 A 11.5 11.5 0 1 0 32.1 32.1"
            stroke="#0F172A" stroke-width="3.6" stroke-linecap="round"/>
      <line x1="32.1" y1="32.1" x2="39.7" y2="39.7"
            stroke="#0F172A" stroke-width="3.6" stroke-linecap="round"/>
    </symbol>

    <symbol id="q-icon-teal" viewBox="0 0 48 48">
      <path d="M 27 35.1 A 11.5 11.5 0 1 0 32.1 32.1"
            stroke="#0F766E" stroke-width="3.6" stroke-linecap="round"/>
      <line x1="32.1" y1="32.1" x2="39.7" y2="39.7"
            stroke="#0F766E" stroke-width="3.6" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BRAND SHEET BACKGROUND                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect width="960" height="640" fill="#F0F4F8"/>

  <!-- Header strip -->
  <rect width="960" height="56" fill="#0F172A"/>
  <text x="32" y="36"
        font-family="Inter, sans-serif" font-weight="600" font-size="14"
        letter-spacing="3" fill="#64748B">QAID  ·  BRAND GUIDELINES</text>
  <text x="928" y="36" text-anchor="end"
        font-family="Inter, sans-serif" font-size="13"
        fill="#475569">قيد  |  Accounting Intelligence</text>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1 — LOGO LOCKUPS (light / dark / teal)            -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Label -->
  <text x="32" y="98"
        font-family="Inter, sans-serif" font-size="11" font-weight="600"
        letter-spacing="2" fill="#94A3B8">LOGO LOCKUPS</text>

  <!-- Card 1: Light -->
  <rect x="32" y="110" width="272" height="120" rx="8" fill="#FFFFFF"/>
  <use href="#q-icon-gradient" x="56" y="134" width="40" height="40"/>
  <text x="108" y="160"
        font-family="Inter, sans-serif" font-weight="600" font-size="22"
        letter-spacing="2.5" fill="#0F172A">QAID</text>
  <text x="56" y="220"
        font-family="Inter, sans-serif" font-size="10" fill="#94A3B8"
        letter-spacing="1">LIGHT  /  WHITE BACKGROUND</text>

  <!-- Card 2: Dark -->
  <rect x="320" y="110" width="272" height="120" rx="8" fill="#0D1117"/>
  <use href="#q-icon-gradient" x="344" y="134" width="40" height="40"/>
  <text x="396" y="160"
        font-family="Inter, sans-serif" font-weight="600" font-size="22"
        letter-spacing="2.5" fill="#F8FAFC">QAID</text>
  <text x="344" y="220"
        font-family="Inter, sans-serif" font-size="10" fill="#475569"
        letter-spacing="1">DARK  /  DARK BACKGROUND</text>

  <!-- Card 3: Teal brand -->
  <rect x="608" y="110" width="320" height="120" rx="8" fill="#0F766E"/>
  <use href="#q-icon-white" x="632" y="134" width="40" height="40"/>
  <text x="684" y="160"
        font-family="Inter, sans-serif" font-weight="600" font-size="22"
        letter-spacing="2.5" fill="#FFFFFF">QAID</text>
  <text x="720" y="160"
        font-family="Inter, sans-serif" font-weight="600" font-size="22"
        letter-spacing="2" fill="rgba(255,255,255,0.5)">  /  </text>
  <text x="752" y="160"
        font-family="Tajawal, sans-serif" font-weight="700" font-size="24"
        fill="#FFFFFF">قيد</text>
  <text x="632" y="220"
        font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)"
        letter-spacing="1">BRAND TEAL  /  PRIMARY BACKGROUND</text>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2 — ARABIC + MONOCHROME + ICON ONLY               -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="32" y="268"
        font-family="Inter, sans-serif" font-size="11" font-weight="600"
        letter-spacing="2" fill="#94A3B8">VARIATIONS</text>

  <!-- Arabic light -->
  <rect x="32" y="280" width="200" height="100" rx="8" fill="#FFFFFF"/>
  <use href="#q-icon-gradient" x="52" y="300" width="36" height="36"/>
  <text x="168" y="322" text-anchor="end"
        font-family="Tajawal, sans-serif" font-weight="700" font-size="26"
        fill="#0F172A">قيد</text>
  <text x="52" y="368"
        font-family="Inter, sans-serif" font-size="10" fill="#94A3B8"
        letter-spacing="1">ARABIC  /  TAJAWAL BOLD</text>

  <!-- Arabic dark -->
  <rect x="248" y="280" width="200" height="100" rx="8" fill="#0D1117"/>
  <use href="#q-icon-gradient" x="268" y="300" width="36" height="36"/>
  <text x="384" y="322" text-anchor="end"
        font-family="Tajawal, sans-serif" font-weight="700" font-size="26"
        fill="#F8FAFC">قيد</text>
  <text x="268" y="368"
        font-family="Inter, sans-serif" font-size="10" fill="#475569"
        letter-spacing="1">ARABIC DARK</text>

  <!-- Monochrome -->
  <rect x="464" y="280" width="200" height="100" rx="8" fill="#FFFFFF"
        stroke="#E2E8F0" stroke-width="1"/>
  <use href="#q-icon-dark" x="484" y="300" width="36" height="36"/>
  <text x="532" y="322"
        font-family="Inter, sans-serif" font-weight="600" font-size="20"
        letter-spacing="2.5" fill="#0F172A">QAID</text>
  <text x="484" y="368"
        font-family="Inter, sans-serif" font-size="10" fill="#94A3B8"
        letter-spacing="1">MONOCHROME  /  BLACK</text>

  <!-- Icon only — three sizes -->
  <rect x="680" y="280" width="248" height="100" rx="8" fill="#F8FAFC"
        stroke="#E2E8F0" stroke-width="1"/>
  <!-- Large icon -->
  <use href="#q-icon-gradient" x="700" y="292" width="52" height="52"/>
  <!-- App icon tile -->
  <rect x="772" y="296" width="52" height="52" rx="11" fill="#0F766E"/>
  <use href="#q-icon-white" x="772" y="296" width="52" height="52"/>
  <!-- Mono icon -->
  <use href="#q-icon-dark" x="848" y="298" width="48" height="48"/>
  <text x="700" y="368"
        font-family="Inter, sans-serif" font-size="10" fill="#94A3B8"
        letter-spacing="1">ICON  /  GRADIENT · APP · MONO</text>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3 — COLOR PALETTE                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="32" y="420"
        font-family="Inter, sans-serif" font-size="11" font-weight="600"
        letter-spacing="2" fill="#94A3B8">COLOR PALETTE</text>

  <!-- Swatch 1 -->
  <rect x="32" y="432" width="100" height="56" rx="6" fill="#0F766E"/>
  <text x="42" y="452" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Primary</text>
  <text x="42" y="467" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#FFFFFF">#0F766E</text>
  <text x="42" y="480" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Teal 700</text>

  <!-- Swatch 2 -->
  <rect x="148" y="432" width="100" height="56" rx="6" fill="#2563EB"/>
  <text x="158" y="452" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Secondary</text>
  <text x="158" y="467" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#FFFFFF">#2563EB</text>
  <text x="158" y="480" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Blue 600</text>

  <!-- Swatch 3 -->
  <rect x="264" y="432" width="100" height="56" rx="6" fill="#0F172A"/>
  <text x="274" y="452" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Dark</text>
  <text x="274" y="467" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#FFFFFF">#0F172A</text>
  <text x="274" y="480" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Slate 950</text>

  <!-- Swatch 4 -->
  <rect x="380" y="432" width="100" height="56" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="452" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8">Light</text>
  <text x="390" y="467" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#0F172A">#FFFFFF</text>
  <text x="390" y="480" font-family="Inter, sans-serif" font-size="9" fill="#CBD5E1">White</text>

  <!-- Swatch 5 -->
  <rect x="496" y="432" width="100" height="56" rx="6" fill="#64748B"/>
  <text x="506" y="452" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Neutral</text>
  <text x="506" y="467" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#FFFFFF">#64748B</text>
  <text x="506" y="480" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Slate 500</text>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3 — TYPOGRAPHY                                    -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="628" y="420"
        font-family="Inter, sans-serif" font-size="11" font-weight="600"
        letter-spacing="2" fill="#94A3B8">TYPOGRAPHY</text>

  <rect x="628" y="432" width="300" height="56" rx="6" fill="#FFFFFF"
        stroke="#E2E8F0" stroke-width="1"/>
  <text x="644" y="452"
        font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" letter-spacing="1">EN — INTER SEMIBOLD 600</text>
  <text x="644" y="470"
        font-family="Inter, sans-serif" font-weight="600" font-size="16"
        letter-spacing="3" fill="#0F172A">QAID</text>
  <text x="800" y="452"
        font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" letter-spacing="1">AR — TAJAWAL BOLD 700</text>
  <text x="810" y="470"
        font-family="Tajawal, sans-serif" font-weight="700" font-size="20"
        fill="#0F172A">قيد</text>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 4 — ICON USAGE AT SIZES                           -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="32" y="528"
        font-family="Inter, sans-serif" font-size="11" font-weight="600"
        letter-spacing="2" fill="#94A3B8">ICON SCALE</text>

  <rect x="32" y="540" width="896" height="72" rx="8" fill="#FFFFFF"
        stroke="#E2E8F0" stroke-width="1"/>

  <!-- 64px -->
  <use href="#q-icon-gradient" x="56" y="552" width="48" height="48"/>
  <text x="80" y="610" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">64px</text>

  <!-- 48px -->
  <use href="#q-icon-gradient" x="136" y="558" width="36" height="36"/>
  <text x="154" y="610" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">48px</text>

  <!-- 32px -->
  <use href="#q-icon-gradient" x="208" y="564" width="24" height="24"/>
  <text x="220" y="610" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">32px</text>

  <!-- 24px -->
  <use href="#q-icon-gradient" x="272" y="568" width="18" height="18"/>
  <text x="281" y="610" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">24px</text>

  <!-- 16px -->
  <use href="#q-icon-gradient" x="328" y="572" width="12" height="12"/>
  <text x="334" y="610" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">16px</text>

  <!-- Gradient preview strip -->
  <rect x="400" y="556" width="180" height="40" rx="6">
    <animate attributeName="opacity" values="0;0" dur="0"/>
  </rect>
  <defs>
    <linearGradient id="strip" x1="400" y1="0" x2="580" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect x="400" y="558" width="180" height="40" rx="6" fill="url(#strip)"/>
  <text x="490" y="582" text-anchor="middle"
        font-family="Inter, sans-serif" font-weight="600" font-size="11"
        letter-spacing="2" fill="#FFFFFF">PRIMARY GRADIENT</text>

  <!-- Spacing note -->
  <text x="620" y="565"
        font-family="Inter, sans-serif" font-size="10" fill="#0F766E" font-weight="600">Clear space:</text>
  <text x="620" y="580"
        font-family="Inter, sans-serif" font-size="10" fill="#64748B">Minimum 50% icon width</text>
  <text x="620" y="594"
        font-family="Inter, sans-serif" font-size="10" fill="#64748B">on all sides</text>

  <text x="800" y="565"
        font-family="Inter, sans-serif" font-size="10" fill="#0F766E" font-weight="600">Minimum size:</text>
  <text x="800" y="580"
        font-family="Inter, sans-serif" font-size="10" fill="#64748B">16px digital</text>
  <text x="800" y="594"
        font-family="Inter, sans-serif" font-size="10" fill="#64748B">12mm print</text>

</svg>
