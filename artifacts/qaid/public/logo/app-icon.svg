<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#134E9F"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)"/>

  <!-- Subtle inner glow overlay -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)" opacity="0.15"/>

  <!-- White Q icon, scaled to ~280×280 and centered (offset 116, 116) -->
  <!-- Original 48×48 → scale 5.833 → 280×280 -->
  <g transform="translate(116 116) scale(5.8333)" filter="url(#shadow)">
    <!-- Q ring -->
    <path d="M 27 35.1 A 11.5 11.5 0 1 0 32.1 32.1"
          stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round"
          stroke-opacity="0.95"/>
    <!-- Q tail -->
    <line x1="32.1" y1="32.1" x2="39.7" y2="39.7"
          stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round"
          stroke-opacity="0.95"/>
  </g>
</svg>
