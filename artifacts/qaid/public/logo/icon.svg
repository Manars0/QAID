<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Q ring: 330° arc, gap at 4-5 o'clock (45°–75°) -->
  <path d="M 27 35.1 A 11.5 11.5 0 1 0 32.1 32.1"
        stroke="url(#qg)" stroke-width="3.6" stroke-linecap="round"/>
  <!-- Q tail: 45° ledger-line diagonal -->
  <line x1="32.1" y1="32.1" x2="39.7" y2="39.7"
        stroke="url(#qg)" stroke-width="3.6" stroke-linecap="round"/>
</svg>
